services:
  - type: web
    name: chatworld-backend
    env: python
    buildCommand: cd frontend && npm ci && npm run build && cd .. && mkdir -p backend/app/static && cp -r frontend/dist/* backend/app/static/ && pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: REDIS_URL
        sync: false
      - key: CORS_ORIGINS
        value: '["*"]'
