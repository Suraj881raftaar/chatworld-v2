name = "chatworld"
main = "src/index.ts"
compatibility_date = "2024-04-03"

# Static assets served from frontend
[assets]
directory = "../frontend/dist"
binding = "ASSETS"

[[durable_objects.bindings]]
name = "CHAT_ROOM"
class_name = "ChatRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRoom"]

[vars]
ENVIRONMENT = "production"
